<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ONTH Driver Gameplan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black:    #080a0d;
  --dark:     #0d1017;
  --card:     #111520;
  --border:   #1e2535;
  --gold:     #00d4ff;
  --gold2:    #40e4ff;
  --gold-dim: #006e85;
  --gold-bg:  rgba(0,212,255,0.07);
  --gold-bd:  rgba(0,212,255,0.20);
  --white:    #e8edf5;
  --muted:    #4a5568;
  --green:    #22d98a;
  --red:      #ff4d6a;
  --amber:    #ffb020;

  --rescue:     #e07b39;
  --rescue-bg:  rgba(224,123,57,0.12);
  --rescue-bd:  rgba(224,123,57,0.30);
  --helper:     #3db88a;
  --helper-bg:  rgba(61,184,138,0.12);
  --helper-bd:  rgba(61,184,138,0.30);
  --close:      #4a9edd;
  --close-bg:   rgba(74,158,221,0.12);
  --close-bd:   rgba(74,158,221,0.30);
  --cdat:       #9b6fe0;
  --cdat-bg:    rgba(155,111,224,0.12);
  --cdat-bd:    rgba(155,111,224,0.30);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:var(--black); color:var(--white);
  font-family:'DM Sans',sans-serif; font-size:15px;
  line-height:1.7; -webkit-font-smoothing:antialiased;
  min-height:100vh; overflow-x:hidden;
}

/* ── HERO ─────────────────────────────────────────────── */
.hero {
  position:relative;
  background:var(--dark);
  overflow:hidden;
  padding:32px 20px 28px;
}
.hero::before{content:'';position:absolute;top:-60px;left:-80px;width:420px;height:420px;background:conic-gradient(from 200deg at 30% 40%,rgba(0,212,255,0.18) 0deg,rgba(0,212,255,0.04) 60deg,transparent 90deg);pointer-events:none;}
.hero::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent 0%,var(--gold) 40%,var(--gold2) 60%,transparent 100%);}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;}
.hero-top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.hero-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-bd);padding:5px 12px;border-radius:2px;}
.hero-name {
  position:relative; z-index:2;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(46px,13vw,88px);
  line-height:0.88; letter-spacing:0.02em;
  color:var(--white);
  text-shadow:0 2px 40px rgba(0,212,255,0.12);
  animation:nameReveal .7s ease both;
  margin-bottom:8px;
}
.hero-name span { display:block; color:var(--gold); font-size:clamp(20px,5vw,38px); letter-spacing:.06em; }
.hero-meta {
  position:relative; z-index:2;
  font-family:'DM Mono',monospace;
  font-size:9px; letter-spacing:.15em;
  color:var(--muted); text-transform:uppercase;
  margin-top:10px;
}

/* ── WRAPPER ─────────────────────────────────────────────── */
.wrapper {
  width:100%; max-width:760px;
  margin:0 auto; padding:0 16px 80px;
}

/* ── SECTION ─────────────────────────────────────────────── */
.section {
  margin-top:40px;
  opacity:0; transform:translateY(14px);
  transition:opacity .4s ease, transform .4s ease;
}
.section.visible { opacity:1; transform:none; }

.section-label {
  font-family:'DM Mono',monospace;
  font-size:9.5px; letter-spacing:.28em;
  text-transform:uppercase; color:var(--gold);
  margin-bottom:12px;
  display:flex; align-items:center; gap:12px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── STAT GRID ────────────────────────────────────────────── */
.stat-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.stat-grid.three { grid-template-columns:repeat(3,1fr); }

.stat-item {
  background:var(--card); border:1px solid var(--border);
  border-radius:5px; padding:14px 16px;
  display:flex; flex-direction:column; gap:4px;
}
.stat-item.accent {
  border-color:var(--gold-bd);
  background:var(--gold-bg);
}
.stat-lbl {
  font-family:'DM Mono',monospace; font-size:9px;
  letter-spacing:.2em; text-transform:uppercase;
  color:var(--muted);
}
.stat-val {
  font-family:'Bebas Neue',sans-serif;
  font-size:32px; line-height:1;
  color:var(--white);
}
.stat-val.gold { color:var(--gold); }
.stat-val.sm { font-size:22px; }

/* ── ROUTE HERO ───────────────────────────────────────────── */
.route-hero {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,14vw,96px);
  line-height:1; letter-spacing:.04em;
  color:var(--gold); margin-bottom:6px;
}
.route-type-badge {
  font-family:'DM Mono',monospace; font-size:11px;
  padding:4px 14px; border-radius:2px; letter-spacing:.1em;
  text-transform:uppercase; font-weight:500;
}
.route-type-badge.rescue  { background:var(--rescue-bg);  color:var(--rescue);  border:1px solid var(--rescue-bd); }
.route-type-badge.helper  { background:var(--helper-bg);  color:var(--helper);  border:1px solid var(--helper-bd); }
.route-type-badge.close   { background:var(--close-bg);   color:var(--close);   border:1px solid var(--close-bd); }
.route-type-badge.cdat    { background:var(--cdat-bg);     color:var(--cdat);    border:1px solid var(--cdat-bd); }
.route-type-badge.default { background:var(--gold-bg);    color:var(--gold);    border:1px solid var(--gold-bd); }
.route-header {
  display:flex; align-items:center; gap:14px;
  margin-bottom:20px;
}
.route-badge-lg {
  font-family:'DM Mono',monospace; font-size:13px;
  padding:6px 16px; border-radius:3px; letter-spacing:.06em;
  text-transform:uppercase; font-weight:500; flex-shrink:0;
}
.route-badge-lg.rescue  { background:var(--rescue-bg);  color:var(--rescue);  border:1px solid var(--rescue-bd); }
.route-badge-lg.helper  { background:var(--helper-bg);  color:var(--helper);  border:1px solid var(--helper-bd); }
.route-badge-lg.close   { background:var(--close-bg);   color:var(--close);   border:1px solid var(--close-bd); }
.route-badge-lg.cdat    { background:var(--cdat-bg);     color:var(--cdat);    border:1px solid var(--cdat-bd); }
.route-badge-lg.default { background:var(--gold-bg);    color:var(--gold);    border:1px solid var(--gold-bd); }

.route-name-big {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(24px,5vw,38px); letter-spacing:.04em;
  line-height:1;
}

/* ── DIFF BAR ─────────────────────────────────────────────── */
.diff-section { margin-top:20px; }
.diff-label-row {
  display:flex; justify-content:space-between;
  font-family:'DM Mono',monospace; font-size:10px;
  letter-spacing:.12em; text-transform:uppercase;
  color:var(--muted); margin-bottom:8px;
}
.diff-label-row strong {
  color:var(--white); font-family:'Bebas Neue',sans-serif;
  font-size:22px; letter-spacing:.04em; line-height:1;
}
.diff-track {
  width:100%; height:7px; background:rgba(255,255,255,.08);
  border-radius:4px; overflow:hidden;
}
.diff-fill {
  height:100%; border-radius:4px;
  transition:width .6s cubic-bezier(.22,1,.36,1);
}
.diff-fill.low    { background:var(--green); }
.diff-fill.medium { background:var(--amber); }
.diff-fill.high   { background:var(--red); }

/* ── ROUTE DETAIL ROW ─────────────────────────────────────── */
.detail-row {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px; margin-top:14px;
}

/* ── CARD ─────────────────────────────────────────────────── */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:5px; padding:18px 16px;
}
.card-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:16px; letter-spacing:.07em; color:var(--gold);
  margin-bottom:16px;
  display:flex; align-items:center; gap:9px;
}
.ci {
  width:24px; height:24px; flex-shrink:0;
  background:var(--gold-bg); border:1px solid var(--gold-bd);
  border-radius:3px; display:flex; align-items:center; justify-content:center;
}
.ci svg { width:12px; height:12px; stroke:var(--gold); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

/* ── ERROR / LOADING ──────────────────────────────────────── */
.state-box {
  padding:48px 24px; text-align:center;
  color:var(--muted); font-family:'DM Mono',monospace;
  font-size:11px; letter-spacing:.12em; line-height:2;
}
.state-box .big {
  font-family:'Bebas Neue',sans-serif;
  font-size:48px; color:var(--border);
  display:block; line-height:1; margin-bottom:12px;
}

/* ── NO DATA PILL ─────────────────────────────────────────── */
.none { color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; }

/* ── FOOTER ───────────────────────────────────────────────── */
.footer {
  border-top:1px solid var(--border);
  padding:32px 16px; text-align:center;
  color:var(--muted); font-size:12px;
}
.footer-logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:24px; letter-spacing:.06em;
  color:var(--white); margin-bottom:4px;
}
.footer-logo span { color:var(--gold); }

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media(max-width:480px) {
  .stat-grid.three { grid-template-columns:1fr 1fr; }
  .detail-row { grid-template-columns:1fr; }
}
@media(min-width:600px) {
  .wrapper { padding:0 28px 100px; }
  .card { padding:22px 24px; }
  .stat-item { padding:16px 20px; }
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:none; }
}
@keyframes nameReveal {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:none; }
}

/* Spinner */
.spin {
  width:28px; height:28px; border-radius:50%;
  border:3px solid var(--border);
  border-top-color:var(--gold);
  animation:spin .7s linear infinite;
  margin:0 auto 14px;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-grid"></div>
  <div class="hero-top">
    <div class="hero-badge">DSJ5 · Driver Gameplan</div>
    <div class="hero-badge" id="dateBadge"></div>
  </div>
  <div class="hero-name" id="heroName">
    <span>Loading...</span>
  </div>
  <p class="hero-meta">DSJ5 &nbsp;&middot;&nbsp; Fresno, CA</p>
</section>

<div class="wrapper" id="mainContent">
  <div class="section visible" style="margin-top:32px;">
    <div class="card">
      <div class="state-box">
        <div class="spin"></div>
        Fetching your assignment...
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-logo">On The <span>Level</span> Logistics</div>
  <p>825 N Clovis Ave &nbsp;&middot;&nbsp; Fresno, CA &nbsp;&middot;&nbsp; DSJ5</p>
</footer>

<script>
// ── CONFIG ───────────────────────────────────────────────────
var API_URL = 'https://script.google.com/macros/s/AKfycbzLd7-DuwbqvCiRU-0pjw9NlOTGfSVyqW9c2Vam1JK8hnh1ouZeZtkv1KXV2OvtM-Zn/exec';

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
  var now = new Date();
  document.getElementById('dateBadge').textContent =
    now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();

  var params = new URLSearchParams(window.location.search);
  var driver = params.get('driver') || params.get('name') || '';

  if (!driver.trim()) {
    renderError('No driver specified', 'Add ?driver=YourName to the URL');
    return;
  }

  loadData(driver.trim());
});

// ── FETCH ────────────────────────────────────────────────────
function loadData(driver) {
  var url = API_URL + '?driver=' + encodeURIComponent(driver) + '&mode=gameplan';
  fetch(url)
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (data) {
      if (data.error) throw new Error(data.error);
      render(data);
    })
    .catch(function (e) {
      renderError('Could not load assignment', e.message);
    });
}

// ── RENDER ───────────────────────────────────────────────────
function render(data) {
  var gp  = data.gameplan  || {};
  var rh  = data.route     || {};

  var name   = str(gp.name)   || 'Driver';
  var route  = str(gp.route)  || '';
  var van    = str(gp.van)    || '';
  var wave   = str(gp.wave)   || '';
  var stops  = str(gp.stops)  || '';
  var rts    = str(gp.rts)    || '';

  // Hero
  var nameParts = name.split(' ');
  var firstName = nameParts[0] || name;
  var lastName  = nameParts.slice(1).join(' ');
  document.getElementById('heroName').innerHTML =
    '<span>' + esc(firstName) + '</span>' +
    (lastName ? esc(lastName) : '');

  // Route helper fields
  var diffRaw    = str(rh.difficulty) || '';
  var bizStops   = str(rh.businessStops) || '';
  var apts       = str(rh.apartments) || '';
  var routeLabel = str(rh.route) || route;

  // Parse difficulty
  var rawNum = parseFloat(diffRaw.replace('%',''));
  var diff   = (!isNaN(rawNum) && rawNum > 0 && rawNum <= 1) ? rawNum * 100 : rawNum;
  var diffPct = isNaN(diff) ? null : diff;
  var diffClass = diffPct === null ? '' : (diffPct < 40 ? 'low' : diffPct < 70 ? 'medium' : 'high');

  var html = '';

  // ── TODAY'S ASSIGNMENT ──────────────────────────────────────
  html += '<div class="section">';
  html += '<div class="section-label">Today\'s Assignment</div>';
  html += '<div class="card">';
  html += '<div class="card-title">';
  html += '<span class="ci"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>';
  html += 'Assignment Details';
  html += '</div>';

  // Bag/Van | Wave Time | Route/Assignment
  html += '<div class="stat-grid three" style="margin-top:4px;">';
  html += statItem('Route / Assignment', route || '—', route ? 'gold' : '');
  html += statItem('Bag / Van',  van  || '—', '');
  html += statItem('Wave Time',  wave || '—', wave ? 'gold' : '');
  html += '</div>';

  html += '<div class="stat-grid" style="margin-top:8px;">';
  html += statItem('RTS w/ Breaks', rts || '—', '');
  html += '</div>';

  html += '</div>'; // .card
  html += '</div>'; // .section

  // ── ROUTE PROFILE ───────────────────────────────────────────
  var hasRouteData = diffPct !== null || bizStops || apts || stops;
  if (hasRouteData) {
    html += '<div class="section">';
    html += '<div class="section-label">Route Profile</div>';
    html += '<div class="card">';
    html += '<div class="card-title">';
    html += '<span class="ci"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>';
    html += 'Route Details';
    html += '</div>';

    if (diffPct !== null) {
      html += '<div class="diff-section">';
      html += '<div class="diff-label-row">';
      html += '<span>Route Difficulty</span>';
      html += '<strong>' + diffPct.toFixed(0) + '%</strong>';
      html += '</div>';
      html += '<div class="diff-track"><div class="diff-fill ' + diffClass + '" style="width:' + Math.min(diffPct,100) + '%"></div></div>';
      html += '</div>';
    }

    html += '<div class="detail-row" style="margin-top:14px;">';
    if (stops) html += statItem('Total Stops', stops, 'gold');
    if (bizStops) html += statItem('Business Stops', bizStops, '');
    if (apts)     html += statItem('Apartments', apts, '');
    html += '</div>';

    html += '</div>'; // .card
    html += '</div>'; // .section
  }

  document.getElementById('mainContent').innerHTML = html;

  // Trigger scroll animations
  var obs = new IntersectionObserver(function(e){
    e.forEach(function(x){ if(x.isIntersecting) x.target.classList.add('visible'); });
  }, {threshold:0.05});
  document.querySelectorAll('.section').forEach(function(s){ obs.observe(s); });
}

// ── HELPERS ──────────────────────────────────────────────────
function statItem(label, val, valClass) {
  return '<div class="stat-item' + (valClass === 'gold' ? ' accent' : '') + '">' +
    '<div class="stat-lbl">' + esc(label) + '</div>' +
    '<div class="stat-val' + (valClass ? ' ' + valClass : '') + ' ' + (String(val).length > 6 ? 'sm' : '') + '">' + esc(val) + '</div>' +
    '</div>';
}

function routeClass(route) {
  var r = str(route).toLowerCase();
  if (r === 'rescue')       return 'rescue';
  if (r.includes('helper')) return 'helper';
  if (r === 'close')        return 'close';
  if (r === 'cdat')         return 'cdat';
  return 'default';
}

function renderError(title, msg) {
  document.getElementById('heroName').innerHTML = '<span>Not Found</span>';
  document.getElementById('mainContent').innerHTML =
    '<div class="section visible" style="margin-top:32px;"><div class="card"><div class="state-box">' +
    '<span class="big">!</span>' +
    '<strong>' + esc(title) + '</strong><br>' +
    '<span>' + esc(msg) + '</span>' +
    '</div></div></div>';
}

function str(v) { return String(v == null ? '' : v).trim(); }
function esc(s) { return str(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>

</body>
</html>
