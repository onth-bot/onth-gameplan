<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070a0f">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ONTH Driver Gameplan</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/onth-bot/dsp-shared-ui@main/dsp-ui-core.js?"></script>

<style>
*,*::before,*::after {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  background: var(--bg);
}

body {
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  background: var(--page-bg);
  color: var(--text);
  font-family: var(--font-body, 'DM Sans', sans-serif);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}

.hero {
  position: relative;
  overflow: hidden;
  padding: 30px 20px 32px;
  background:
    linear-gradient(135deg, var(--accent-bg), transparent 36%),
    linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 100%);
  border-bottom: 1px solid var(--accent-bd);
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: linear-gradient(to bottom, black, transparent 88%);
}

.hero::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
}

.hero-top,
.hero-name,
.hero-meta,
.hero-kicker {
  position: relative;
  z-index: 2;
  max-width: 760px;
  margin-left: auto;
  margin-right: auto;
}

.hero-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 18px;
}

.hero-badge {
  font-family: var(--font-mono, 'DM Mono', monospace);
  font-size: 9px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-bg);
  border: 1px solid var(--accent-bd);
  padding: 6px 11px;
  border-radius: 999px;
  white-space: nowrap;
}

.hero-kicker {
  color: var(--text-muted);
  font-family: var(--font-mono, 'DM Mono', monospace);
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.hero-name {
  font-family: var(--font-display, 'Bebas Neue', sans-serif);
  font-size: clamp(50px, 12vw, 86px);
  line-height: .9;
  letter-spacing: .025em;
  color: var(--text);
  text-shadow: 0 12px 38px rgba(var(--accent-rgb), .13);
  animation: dsp-nameReveal .55s ease both;
}

.hero-name span {
  display: block;
  color: var(--accent);
  font-size: clamp(24px, 5.4vw, 40px);
  letter-spacing: .07em;
}

.hero-meta {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  color: var(--text-soft);
  font-family: var(--font-mono, 'DM Mono', monospace);
  font-size: 9px;
  letter-spacing: .13em;
  text-transform: uppercase;
}

.hero-meta span {
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border-soft);
}

.wrapper {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  padding: 0 16px 76px;
}

.section {
  margin-top: 26px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity .38s ease, transform .38s ease;
}

.section.visible {
  opacity: 1;
  transform: none;
}

.section-label {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 10px;
  color: var(--accent);
  font-family: var(--font-mono, 'DM Mono', monospace);
  font-size: 9.5px;
  letter-spacing: .24em;
  text-transform: uppercase;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border-main), transparent);
}

.card {
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,.035), transparent),
    var(--card-surface);
  border: 1px solid var(--border-main);
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow-card);
}

.card.primary {
  padding: 0;
  border-color: var(--accent-bd);
  background:
    radial-gradient(circle at top right, rgba(var(--accent-rgb), .16), transparent 18rem),
    linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 100%);
  box-shadow: var(--shadow-lg);
}

.card-title {
  font-family: var(--font-display, 'Bebas Neue', sans-serif);
  font-size: 18px;
  letter-spacing: .075em;
  color: var(--accent);
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.ci {
  width: 26px;
  height: 26px;
  flex-shrink: 0;
  background: var(--accent-bg);
  border: 1px solid var(--accent-bd);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ci svg {
  width: 13px;
  height: 13px;
  stroke: var(--accent);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.assignment-head {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border-soft);
}

.assignment-kicker,
.quick-label,
.stat-lbl {
  color: var(--text-muted);
  font-family: var(--font-mono, 'DM Mono', monospace);
  font-size: 8.5px;
  letter-spacing: .17em;
  text-transform: uppercase;
}

.assignment-route-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 14px;
  margin-top: 5px;
}

.assignment-route {
  font-family: var(--font-display, 'Bebas Neue', sans-serif);
  font-size: clamp(48px, 13vw, 82px);
  line-height: .92;
  letter-spacing: .045em;
  color: var(--accent);
  text-shadow: 0 8px 32px rgba(var(--accent-rgb), .18);
  word-break: break-word;
}

.route-type-badge {
  flex-shrink: 0;
  margin-bottom: 8px;
  padding: 5px 12px;
  border-radius: 999px;
  font-family: var(--font-mono, 'DM Mono', monospace);
  font-size: 9px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-bg);
  border: 1px solid var(--accent-bd);
}

.route-type-badge.rescue {
  color: #e07b39;
  background: rgba(224,123,57,.14);
  border-color: rgba(224,123,57,.34);
}

.route-type-badge.helper {
  color: #3db88a;
  background: rgba(61,184,138,.14);
  border-color: rgba(61,184,138,.34);
}

.route-type-badge.close {
  color: #4a9edd;
  background: rgba(74,158,221,.14);
  border-color: rgba(74,158,221,.34);
}

.route-type-badge.cdat {
  color: #9b6fe0;
  background: rgba(155,111,224,.14);
  border-color: rgba(155,111,224,.34);
}

.quick-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border-soft);
}

.quick-item {
  padding: 16px 14px;
  background: rgba(8,12,19,.42);
}

.quick-val,
.stat-val {
  color: var(--text);
  font-family: var(--font-display, 'Bebas Neue', sans-serif);
  font-size: 30px;
  line-height: 1;
  letter-spacing: .035em;
  margin-top: 5px;
}

.quick-val.gold,
.stat-val.gold {
  color: var(--accent);
}

.quick-val.sm,
.stat-val.sm {
  font-size: 21px;
}

.stat-item {
  min-width: 0;
  padding: 15px 16px;
  border-radius: 14px;
  background: rgba(255,255,255,.035);
  border: 1px solid var(--border-soft);
}

.stat-item.accent {
  background: var(--accent-bg);
  border-color: var(--accent-bd);
}

.diff-section {
  margin-top: 2px;
}

.diff-label-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.diff-label-row span {
  color: var(--text-muted);
  font-family: var(--font-mono, 'DM Mono', monospace);
  font-size: 9px;
  letter-spacing: .17em;
  text-transform: uppercase;
}

.diff-label-row strong {
  color: var(--text);
  font-family: var(--font-display, 'Bebas Neue', sans-serif);
  font-size: 34px;
  line-height: 1;
}

.diff-tag {
  display: inline-flex;
  margin-top: 6px;
  padding: 4px 9px;
  border-radius: 999px;
  background: rgba(255,255,255,.045);
  border: 1px solid var(--border-soft);
  color: var(--text-soft);
  font-family: var(--font-mono, 'DM Mono', monospace);
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
}

.diff-track {
  width: 100%;
  height: 9px;
  background: var(--border-main);
  border-radius: 999px;
  overflow: hidden;
}

.diff-fill {
  height: 100%;
  border-radius: 999px;
  transition: width .65s cubic-bezier(.22,1,.36,1);
}

.diff-fill.low { background: var(--success); }
.diff-fill.medium { background: var(--warning); }
.diff-fill.high { background: var(--danger); }

.detail-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
  margin-top: 14px;
}

.state-box {
  padding: 48px 22px;
  text-align: center;
  color: var(--text-muted);
  font-family: var(--font-mono, 'DM Mono', monospace);
  font-size: 11px;
  letter-spacing: .12em;
  line-height: 2;
}

.state-box strong {
  color: var(--text);
}

.state-box .big {
  display: block;
  margin-bottom: 8px;
  color: var(--accent);
  font-family: var(--font-display, 'Bebas Neue', sans-serif);
  font-size: 58px;
  line-height: 1;
}

.spin {
  width: 30px;
  height: 30px;
  margin: 0 auto 14px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,.10);
  border-top-color: var(--accent);
  animation: spin .75s linear infinite;
}

.footer {
  padding: 30px 16px 34px;
  border-top: 1px solid var(--border-main);
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
}

.footer-logo {
  font-family: var(--font-display, 'Bebas Neue', sans-serif);
  font-size: 25px;
  letter-spacing: .06em;
  color: var(--text);
  margin-bottom: 4px;
}

.footer-logo span {
  color: var(--accent);
}

@media(max-width:560px) {
  .hero {
    padding: 24px 16px 28px;
  }

  .hero-badge {
    font-size: 8px;
    letter-spacing: .13em;
    padding: 5px 9px;
  }

  .wrapper {
    padding: 0 12px 70px;
  }

  .section {
    margin-top: 20px;
  }

  .card {
    border-radius: var(--radius-lg);
    padding: 16px;
  }

  .assignment-head {
    padding: 18px 15px 14px;
  }

  .assignment-route-row {
    align-items: flex-start;
    flex-direction: column;
    gap: 4px;
  }

  .route-type-badge {
    margin-bottom: 0;
  }

  .quick-grid {
    grid-template-columns: 1fr;
  }

  .quick-item {
    padding: 14px 15px;
  }

  .detail-row {
    grid-template-columns: 1fr 1fr;
  }
}

@media(max-width:380px) {
  .hero-name {
    font-size: 46px;
  }

  .assignment-route {
    font-size: 46px;
  }

  .quick-val,
  .stat-val {
    font-size: 26px;
  }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-top">
    <div class="hero-badge">DSJ5 · Driver Gameplan</div>
    <div class="hero-badge" id="dateBadge"></div>
  </div>

  <div class="hero-kicker">Today's Gameplan</div>

  <div class="hero-name" id="heroName">
    <span>Loading...</span>
  </div>

  <div class="hero-meta">
    <span>DSJ5</span>
    <span>Fresno, CA</span>
    <span>On The Level Logistics</span>
  </div>
</section>

<div class="wrapper" id="mainContent">
  <div class="section visible" style="margin-top:24px;">
    <div class="card">
      <div class="state-box">
        <div class="spin"></div>
        Fetching your assignment...
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-logo">On The <span>Level</span> Logistics</div>
  <p>825 N Clovis Ave &nbsp;&middot;&nbsp; Fresno, CA &nbsp;&middot;&nbsp; DSJ5</p>
</footer>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbzLd7-DuwbqvCiRU-0pjw9NlOTGfSVyqW9c2Vam1JK8hnh1ouZeZtkv1KXV2OvtM-Zn/exec';

document.addEventListener('DOMContentLoaded', function () {
  if (window.DSP_UI && typeof DSP_UI.injectTheme === 'function') {
    DSP_UI.injectTheme();
    DSP_UI.syncThemeColor();
  }

  var now = new Date();

  document.getElementById('dateBadge').textContent =
    now.toLocaleDateString('en-US', {
      weekday: 'short',
      month: 'short',
      day: 'numeric'
    }).toUpperCase();

  var params = new URLSearchParams(window.location.search);
  var driver = params.get('driver') || params.get('name') || '';

  if (!driver.trim()) {
    renderError('No driver specified', 'Add ?driver=YourName to the URL');
    return;
  }

  loadData(driver.trim());
});

function loadData(driver) {
  var url = API_URL + '?driver=' + encodeURIComponent(driver) + '&mode=gameplan';

  fetch(url)
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (data) {
      if (data.error) throw new Error(data.error);
      render(data);
    })
    .catch(function (e) {
      renderError('Could not load assignment', e.message);
    });
}

function render(data) {
  var gp = data.gameplan || {};
  var rh = data.route || {};

  var name  = str(gp.name)  || 'Driver';
  var route = str(gp.route) || '';
  var van   = str(gp.van)   || '';
  var wave  = str(gp.wave)  || '';
  var stops = str(gp.stops) || '';
  var rts   = str(gp.rts)   || '';
  var esph  = str(gp.esph)  || '';

  var parts     = name.split(' ');
  var firstName = parts[0] || name;
  var lastName  = parts.slice(1).join(' ');

  document.getElementById('heroName').innerHTML =
    '<span>' + esc(firstName) + '</span>' +
    (lastName ? esc(lastName) : '');

  var diffRaw   = str(rh.difficulty)    || '';
  var bizStops  = str(rh.businessStops) || '';
  var apts      = str(rh.apartments)    || '';
  var routeLabel = str(rh.route) || route;

  var rawNum   = parseFloat(diffRaw.replace('%',''));
  var diff     = (!isNaN(rawNum) && rawNum > 0 && rawNum <= 1) ? rawNum * 100 : rawNum;
  var diffPct  = isNaN(diff) ? null : diff;
  var diffClass = diffPct === null ? '' : (diffPct < 40 ? 'low' : diffPct < 70 ? 'medium' : 'high');
  var diffText  = diffPct === null ? '' : (diffPct < 40 ? 'Light' : diffPct < 70 ? 'Moderate' : 'Heavy');

  var html = '';

  html += '<div class="section">';
  html += '<div class="section-label">Today\'s Assignment</div>';
  html += '<div class="card primary">';

  html += '<div class="assignment-head">';
  html += '<div class="assignment-kicker">Route / Assignment</div>';
  html += '<div class="assignment-route-row">';
  html += '<div class="assignment-route">' + esc(route || '—') + '</div>';
  html += '<div class="route-type-badge ' + routeClass(routeLabel) + '">' + esc(routeTypeLabel(routeLabel)) + '</div>';
  html += '</div>';
  html += '</div>';

  html += '<div class="quick-grid">';
  html += quickItem('Wave Time', wave || '—', true);
  html += quickItem('Bag / Van', van || '—', false);
  html += quickItem('RTS w/ Breaks', rts || '—', false);
  html += '</div>';

  html += '</div>';
  html += '</div>';

  var hasRouteData = diffPct !== null || bizStops || apts || stops || esph;

  if (hasRouteData) {
    html += '<div class="section">';
    html += '<div class="section-label">Route Profile</div>';
    html += '<div class="card">';

    html += '<div class="card-title">';
    html += '<span class="ci"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>';
    html += 'Route Details';
    html += '</div>';

    if (diffPct !== null) {
      html += '<div class="diff-section">';
      html += '<div class="diff-label-row">';
      html += '<div><span>Route Difficulty</span><br><div class="diff-tag">' + esc(diffText) + '</div></div>';
      html += '<strong>' + diffPct.toFixed(0) + '%</strong>';
      html += '</div>';
      html += '<div class="diff-track"><div class="diff-fill ' + diffClass + '" style="width:' + Math.min(Math.max(diffPct,0),100) + '%"></div></div>';
      html += '</div>';
    }

    html += '<div class="detail-row">';
    if (stops)    html += statItem('Total Stops',     stops,    'gold');
    if (esph)     html += statItem('Expected SPH',    esph,     '');
    if (bizStops) html += statItem('Business Stops',  bizStops, '');
    if (apts)     html += statItem('Apartments',      apts,     '');
    html += '</div>';

    html += '</div>';
    html += '</div>';
  }

  document.getElementById('mainContent').innerHTML = html;
  runAnimations();
}

function quickItem(label, val, gold) {
  return '<div class="quick-item">' +
    '<div class="quick-label">' + esc(label) + '</div>' +
    '<div class="quick-val' + (gold ? ' gold' : '') + (String(val).length > 7 ? ' sm' : '') + '">' + esc(val) + '</div>' +
    '</div>';
}

function statItem(label, val, valClass) {
  return '<div class="stat-item' + (valClass === 'gold' ? ' accent' : '') + '">' +
    '<div class="stat-lbl">' + esc(label) + '</div>' +
    '<div class="stat-val' + (valClass ? ' ' + valClass : '') + (String(val).length > 7 ? ' sm' : '') + '">' + esc(val) + '</div>' +
    '</div>';
}

function routeClass(route) {
  var r = str(route).toLowerCase();
  if (r.includes('rescue')) return 'rescue';
  if (r.includes('helper')) return 'helper';
  if (r.includes('close'))  return 'close';
  if (r.includes('cdat'))   return 'cdat';
  return 'default';
}

function routeTypeLabel(route) {
  var r = str(route).toLowerCase();
  if (r.includes('rescue')) return 'Rescue';
  if (r.includes('helper')) return 'Helper';
  if (r.includes('close'))  return 'Close';
  if (r.includes('cdat'))   return 'CDAT';
  return 'Assigned';
}

function renderError(title, msg) {
  document.getElementById('heroName').innerHTML = '<span>Not Found</span>';
  document.getElementById('mainContent').innerHTML =
    '<div class="section visible" style="margin-top:24px;"><div class="card"><div class="state-box">' +
    '<span class="big">!</span>' +
    '<strong>' + esc(title) + '</strong><br>' +
    '<span>' + esc(msg) + '</span>' +
    '</div></div></div>';
}

function runAnimations() {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('.section').forEach(function (s) {
      s.classList.add('visible');
    });
    return;
  }

  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: .05 });

  document.querySelectorAll('.section').forEach(function(s) {
    obs.observe(s);
  });
}

function str(v) {
  return String(v == null ? '' : v).trim();
}

function esc(s) {
  if (window.DSP_UI && typeof DSP_UI.esc === 'function') {
    return DSP_UI.esc(s).replace(/'/g, '&#39;');
  }

  return str(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
</script>

</body>
</html>
